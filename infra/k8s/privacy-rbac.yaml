apiVersion: apps/v1
kind: Deployment
metadata:
  name: privacy-rbac
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: privacy-rbac
  template:
    metadata:
      labels:
        app: privacy-rbac
    spec:
      containers:
        - name: privacy-rbac
          image: smartcity/privacy-rbac:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          env:
            - name: PRIVACY_API_BASE
              value: http://privacy-rbac:8005
            - name: PRIVACY_RABBITMQ_HOST
              value: rabbitmq
            - name: PRIVACY_RABBITMQ_PORT
              value: "5672"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 8
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: privacy-rbac
  namespace: smartcity
spec:
  selector:
    app: privacy-rbac
  ports:
    - name: http
      port: 8005
      targetPort: 8005

apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: admin
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              value: adminadmin
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: smartcity
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: ehs_telemetry
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              value: dev-token-replace-in-production
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: smartcity
spec:
  selector:
    app: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: 8086